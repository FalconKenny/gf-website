let REGION = "tw", CACHE = {};
function switchRegion(r, btn) {
  REGION = r;
  document.querySelectorAll(".tabbar .tab").forEach(b => b.classList.toggle("active", b === btn));
  document.getElementById("staticBox").innerHTML = r === "tw" ? TW_HTML : US_HTML;
  renderGrants();
}
async function renderGrants() {
  const box = document.getElementById("grantList");
  const sec = REGION === "tw" ? "grant_tw" : "grant_us";
  box.innerHTML = '<p class="empty">載入中…</p>';
  if (!CACHE[sec]) {
    try { CACHE[sec] = await gfPremiumList(sec) || []; }
    catch (e) { CACHE[sec] = []; }
  }
  box.innerHTML = CACHE[sec].length ? CACHE[sec].map(a => `
    <article class="prem-card">
      <div class="prem-meta">
        <span class="badge b-sub">${a.region}</span><span class="badge b-free">${a.cat}</span>
        ${a.apply_start ? `<span class="badge b-apply">📅 申請開始：${gfEsc(a.apply_start)}</span>` : ""}
        ${a.apply_end ? `<span class="badge b-deadline">⏰ 截止：${gfEsc(a.apply_end)}</span>` : ""}
        <span class="mono" style="font-size:12px;color:var(--slate)">${a.published || ""}</span>
      </div>
      <h3>${gfEsc(a.title)}</h3>
      <p class="prem-sum">${gfEsc(a.summary || "")}</p>
      <div class="prem-body">${(a.body || "").split("\n").map(p => p.trim() ? "<p>" + gfEsc(p) + "</p>" : "").join("")}</div>
    </article>`).join("")
  : '<p class="empty">目前以上方彙整表為主；補助快訊將於後台「進階內容管理」陸續上架。</p>';
}
document.addEventListener("DOMContentLoaded", async () => {
  await gfInitOpenAccess();                 /* 先確認是否於全站限時開放期間 */
  if (!gfGatePage(4, "gateBox")) return;   /* 黃金級限定（或開放期間） */
  document.getElementById("staticBox").innerHTML = TW_HTML;
  renderGrants();
});
