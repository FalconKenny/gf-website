let currentCat = "全部";

  currentCat = c;
  renderTabs();
  gfRenderArticles("artList", { cat: c });

  document.getElementById("hotTitle").textContent = c==="全部" ? "今日熱門動態" : `今日熱門動態 · ${c}`;
}
