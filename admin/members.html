<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員管理｜Guide.Ferryman Admin</title>
<link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<script src="../assets/js/sb.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
if (gfAdminGate()) {
  gfAdminShell("mem", "會員與訂閱者管理", "檢視前台加入的會員、切換訂閱狀態與分級。分級欄位已為未來「分級訂閱制」預留。", `
    <div class="panel">
      <h2>會員清單</h2>
      <div style="margin-bottom:14px">
        <button class="btn-sm" onclick="exportCSV()">匯出 CSV（可匯入電子報服務）</button>
        <button class="btn-sm" onclick="addDemo()">＋ 手動新增會員</button>
      </div>
      <table class="tbl">
        <thead><tr><th>加入日</th><th>姓名</th><th>Email</th><th>公司</th><th>關注領域</th><th>訂閱</th><th>分級</th><th>操作</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="panel">
      <h2>四級會員制度</h2>
      <p style="font-size:14px;color:var(--slate)">
        <span class="badge b-free">L1 普通會員（免費）</span>
        <span class="badge b-sub">L2 青銅會員（免費＋訂閱週報）</span>
        <span class="badge b-ok">L3 白銀會員（US$100／NT$3,200 月）</span>
        <span class="badge" style="background:#FBEBD2;color:#9A6614">L4 黃金會員（US$180／NT$6,000 月）</span><br><br>
        ・前台加入會員＋勾選訂閱 → 自動成為青銅（週報發放對象＝「訂閱中」名單）。<br>
        ・白銀／黃金收款確認後：至「⭐ 升級申請與通行碼」開通並寄送通行碼，或在此直接切換分級。<br>
        ・推播管理頁依「訂閱中」與分級篩選發送對象。</p>
    </div>
  `);

  const TIERS = [
    {lv:1, name:"普通會員"}, {lv:2, name:"青銅會員"},
    {lv:3, name:"白銀會員"}, {lv:4, name:"黃金會員"}
  ];
  let LIST = [];
  async function render() {
    try { LIST = await gfSbSelect("members", "&order=joined.desc", true); }
    catch (e) { alert("讀取會員失敗：" + e.message); LIST = GF_getLocal("gf_members", []); }
    const list = LIST;
    document.getElementById("rows").innerHTML = list.map((m,i) => `
      <tr>
        <td class="mono">${m.joined||""}</td>
        <td>${gfEsc(m.name)}</td>
        <td class="mono">${gfEsc(m.email)}</td>
        <td>${gfEsc(m.company)}</td>
        <td>${gfEsc(m.interest||"")}</td>
        <td>${m.subscribe ? '<span class="badge b-sub">訂閱中</span>' : '<span class="badge b-free">未訂閱</span>'}</td>
        <td><select class="sel" style="padding:5px 8px;font-size:12.5px;width:auto" onchange="setTier(${i},this.value)">
          ${TIERS.map(t=>`<option value="${t.lv}" ${m.tier===t.name?"selected":""}>${t.name}</option>`).join("")}</select></td>
        <td>
          <button class="btn-sm" onclick="toggleSub(${i})">切換訂閱</button>
          <button class="btn-sm danger" onclick="del(${i})">刪除</button>
        </td>
      </tr>`).join("") || `<tr><td colspan="8" style="color:var(--slate)">尚無會員。前台「加入會員」送出後會顯示於此。</td></tr>`;
  }
  window.setTier = async (i,v)=>{
    const t = TIERS.find(x=>x.lv==v);
    try{
      const patch = {tier:t.name, tier_level:t.lv};
      /* 青銅以上自動列為週報發放對象 */
      if (t.lv>=2 && !LIST[i].subscribe) patch.subscribe = true;
      const memEmail = LIST[i].email;
      await gfSbUpdate("members", LIST[i].id, patch);
      /* 白銀/黃金：提醒須核發通行碼，前台才能登入解鎖 */
      if (t.lv >= 3) alert("已將分級改為「" + t.name + "」。\n\n⚠️ 別忘了到「⭐ 升級申請與通行碼」→「手動核發通行碼」\n為 " + memEmail + " 產生通行碼——客戶要用通行碼登入，前台才會顯示白銀/黃金並解鎖隱藏頁。");
      render();
    }catch(e){ alert("更新失敗："+e.message);}
  };
  window.toggleSub = async i=>{ try{ await gfSbUpdate("members", LIST[i].id, {subscribe:!LIST[i].subscribe}); render(); }catch(e){ alert("更新失敗："+e.message);} };
  window.del = async i=>{ if(!confirm("刪除此會員？"))return; try{ await gfSbDelete("members", LIST[i].id); render(); }catch(e){ alert("刪除失敗："+e.message);} };
  window.exportCSV = ()=>{
    const l=LIST;
    gfCSV([["加入日","姓名","Email","公司","關注領域","訂閱","分級"]]
      .concat(l.map(m=>[m.joined,m.name,m.email,m.company,m.interest,m.subscribe?"是":"否",m.tier])), "members.csv");
  };
  window.addDemo = async ()=>{
    const name=prompt("姓名？"); if(!name) return;
    const email=prompt("Email？"); if(!email) return;
    try {
      await gfSbInsert("members", {id:"m"+Date.now(),name,email,company:"",interest:"",subscribe:true,tier:"青銅會員",tier_level:2,joined:new Date().toISOString().slice(0,10)}, true);
      render();
    } catch(e){ alert("新增失敗："+e.message); }
  };
  render();
}
</script>
</body>
</html>
