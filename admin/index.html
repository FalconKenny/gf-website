<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儀表板｜Guide.Ferryman Admin</title>
<link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<script src="../assets/js/sb.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
async function gfDashboard() {
  let members = [], consults = [], arts = [], passes = [], upgrades = [], premium = [];
  try {
    members  = await gfSbSelect("members", "", true);
    consults = await gfSbSelect("consults", "", true);
    arts     = await gfSbSelect("articles", "", true);
  } catch (e) {
    members  = GF_getLocal("gf_members", []);
    consults = GF_getLocal("gf_consults", []);
    arts     = GF_getArticles();
  }
  /* v5.3：會員分級與收費系統統計（資料表未建立時安靜略過） */
  try { passes   = await gfSbSelect("member_passes", "", true) || []; } catch (e) {}
  try { upgrades = await gfSbSelect("upgrade_requests", "", true) || []; } catch (e) {}
  try { premium  = await gfSbSelect("premium_articles", "", true) || []; } catch (e) {}

  const subs = members.filter(m => m.subscribe);
  const pending = consults.filter(c => c.status === "待確認");

  const lvCount = l => members.filter(m => (m.tier_level || 1) === l).length;
  const today = new Date();
  const activePass = passes.filter(p => p.active && (!p.expires_at || new Date(p.expires_at) >= today));
  const soonPass = activePass.filter(p => p.expires_at &&
    (new Date(p.expires_at) - today) / 86400000 <= 7);
  const pendingUpg = upgrades.filter(u => u.status === "待付款");

  /* 流量示範資料：串接 GA4 / Vercel Analytics 後改為真實數據（見部署指南） */
  const traffic = GF_getLocal("gf_traffic_demo", [
    ["一", 42], ["二", 58], ["三", 51], ["四", 77], ["五", 96], ["六", 63], ["日", 48]
  ]);
  const maxT = Math.max(...traffic.map(t => t[1]));

  gfAdminShell("dash", "儀表板", "網站營運總覽 · " + new Date().toISOString().slice(0,10), `
    <div class="stat-grid">
      <div class="stat"><div class="k">會員總數</div><div class="v">${members.length}</div><div class="d">⚪${lvCount(1)}　🥉${lvCount(2)}　🥈${lvCount(3)}　🥇${lvCount(4)}</div></div>
      <div class="stat"><div class="k">電子報訂閱數</div><div class="v">${subs.length}</div><div class="d">週報發放對象（青銅以上）</div></div>
      <div class="stat"><div class="k">付費會員（有效通行碼）</div><div class="v">${activePass.length}</div><div class="d">${soonPass.length ? "⚠️ " + soonPass.length + " 位 7 日內到期" : "近 7 日無到期"}</div></div>
      <div class="stat"><div class="k">待處理升級申請</div><div class="v">${pendingUpg.length}</div><div class="d">共 ${upgrades.length} 筆申請紀錄</div></div>
      <div class="stat"><div class="k">待確認諮詢</div><div class="v">${pending.length}</div><div class="d">共 ${consults.length} 筆諮詢紀錄</div></div>
      <div class="stat"><div class="k">已發布文章</div><div class="v">${arts.length}</div><div class="d">另有進階文章 ${premium.length} 篇</div></div>
    </div>

    <div class="panel">
      <h2>本週流量（示範數據）</h2>
      <div class="bar-chart">
        ${traffic.map(t => `<div class="bar" style="height:${Math.round(t[1]/maxT*100)}%"><b>${t[1]}</b><span>週${t[0]}</span></div>`).join("")}
      </div>
      <p class="notice" style="margin-top:36px">※ 上線後建議串接 Google Analytics 4（免費）或 Vercel Analytics 取得真實流量，作法見《部署與整合指南》第 6 節。</p>
    </div>

    <div class="panel">
      <h2>快速動作</h2>
      <a class="btn-sm primary" href="articles.html">＋ 新增文章</a>
      <a class="btn-sm" href="upgrades.html">⭐ 處理升級申請／通行碼</a>
      <a class="btn-sm" href="premium.html">🔒 新增進階文章</a>
      <a class="btn-sm" href="consults.html">處理諮詢排程</a>
      <a class="btn-sm" href="newsletter.html">建立電子報推播</a>
      <button class="btn-sm" onclick="changePass()">管理者帳號說明</button>
    </div>
  `);

  window.changePass = function() {
    alert("管理者帳號與密碼於 Supabase 後台管理：\nAuthentication → Users → 選擇帳號 → Reset password。");
  };
}
if (gfAdminGate()) gfDashboard();
</script>
</body>
</html>
