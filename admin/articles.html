<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理｜Guide.Ferryman Admin</title>
<link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<script src="../assets/js/sb.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
if (gfAdminGate()) {
  gfAdminShell("art", "文章管理", "台美動態資訊的新增、編輯與刪除。所有文章存於 Supabase 雲端資料庫，儲存後前台立即全球生效。", `
    <div class="panel">
      <h2 id="formTitle">新增文章</h2>
      <div class="form-grid">
        <div class="field"><label>標題 *</label><input class="inp" id="fTitle"></div>
        <div class="field"><label>分類 *</label>
          <select class="sel" id="fCat">${GF_CATEGORIES.map(c=>`<option>${c}</option>`).join("")}</select>
        </div>
        <div class="field"><label>發布日期 *</label><input class="inp" type="date" id="fDate"></div>
        <div class="field"><label>&nbsp;</label><span class="notice">預留欄位：未來可加「自動更新來源／訂閱推播內文」</span></div>
        <div class="field full"><label>摘要（列表顯示）</label><textarea class="inp" id="fSummary" rows="2"></textarea></div>
        <div class="field full"><label>內文 *</label><textarea class="inp" id="fBody" rows="10" placeholder="支援純文字換行；未來可升級為 Markdown 編輯器"></textarea></div>
      </div>
      <div style="margin-top:16px">
        <button class="btn-sm primary" onclick="saveArt()">儲存文章</button>
        <button class="btn-sm" onclick="resetForm()">清空表單</button>
      </div>
    </div>

    <div class="panel">
      <h2>文章列表</h2>
      <table class="tbl"><thead><tr><th>日期</th><th>分類</th><th>標題</th><th>來源</th><th style="width:210px">操作</th></tr></thead>
      <tbody id="artRows"></tbody></table>
    </div>

    <div class="panel">
      <h2>每日熱門動態管理</h2>
      <p class="notice" style="margin-bottom:14px">每類別一行一則。存於雲端 hot_topics 表。已預留：未來可由自動抓取程式每日直接寫入該表。</p>
      <div class="form-grid" id="hotFields"></div>
      <div style="margin-top:16px"><button class="btn-sm primary" onclick="saveHot()">儲存熱門動態</button></div>
    </div>
  `);

  let editingId = null;
  const $ = id => document.getElementById(id);

  let ART_LIST = [];
  async function renderRows() {
    try { ART_LIST = await GF_fetchArticles(); }
    catch (e) { ART_LIST = GF_getArticles(); }
    $("artRows").innerHTML = ART_LIST.map(a => `<tr>
        <td class="mono">${a.date||""}</td>
        <td><span class="art-cat cat-${a.cat}" style="font-size:11px">${a.cat}</span></td>
        <td>${gfEsc(a.title)}</td>
        <td><span class="badge b-sub">雲端</span></td>
        <td>
          <button class="btn-sm" onclick="editArt('${a.id}')">編輯</button>
          <button class="btn-sm danger" onclick="delArt('${a.id}')">刪除</button>
        </td></tr>`).join("") || `<tr><td colspan="5" style="color:var(--slate)">尚無文章</td></tr>`;
  }

  window.editArt = function(id) {
    const a = ART_LIST.find(x => x.id === id);
    if (!a) return;
    editingId = id;
    $("formTitle").textContent = "編輯文章";
    $("fTitle").value = a.title; $("fCat").value = a.cat;
    $("fDate").value = a.date || ""; $("fSummary").value = a.summary || ""; $("fBody").value = a.body || "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.saveArt = async function() {
    const rec = { title: $("fTitle").value.trim(), cat: $("fCat").value, date: $("fDate").value,
                  summary: $("fSummary").value.trim(), body: $("fBody").value.trim() };
    if (!rec.title || !rec.date || !rec.body) return alert("標題、日期與內文為必填");
    try {
      if (editingId) await gfSbUpdate("articles", editingId, rec);
      else await gfSbInsert("articles", Object.assign({ id: "a" + Date.now() }, rec), true);
      resetForm(); await renderRows(); alert("已儲存，前台立即生效（全球可見）");
    } catch (err) { alert("儲存失敗：" + err.message + "\n（請確認已登入且網路正常）"); }
  };

  window.delArt = async function(id) {
    if (!confirm("確定刪除這篇文章？")) return;
    try { await gfSbDelete("articles", id); await renderRows(); }
    catch (err) { alert("刪除失敗：" + err.message); }
  };

  window.resetForm = function() {
    editingId = null; $("formTitle").textContent = "新增文章";
    ["fTitle","fSummary","fBody"].forEach(i => $(i).value = "");
    $("fDate").value = new Date().toISOString().slice(0,10);
  };

  /* 熱門動態 */
  async function renderHotFields() {
    const hot = await GF_fetchHot();
    $("hotFields").innerHTML = GF_CATEGORIES.map(c => `
      <div class="field full"><label>${c}</label>
      <textarea class="inp" rows="3" data-hot="${c}">${(hot[c]||[]).join("\n")}</textarea></div>`).join("");
  }
  window.saveHot = async function() {
    try {
      const els = document.querySelectorAll("[data-hot]");
      for (const t of els) {
        const items = t.value.split("\n").map(s => s.trim()).filter(Boolean);
        await gfSb("/rest/v1/hot_topics?cat=eq." + encodeURIComponent(t.dataset.hot),
                   { method: "PATCH", auth: true, body: { items: items, updated_at: new Date().toISOString() } });
      }
      alert("已更新前台熱門動態（全球生效）");
    } catch (err) { alert("儲存失敗：" + err.message); }
  };

  resetForm(); renderRows(); renderHotFields();
}
</script>
</body>
</html>
