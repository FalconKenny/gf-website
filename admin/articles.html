<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理｜Guide.Ferryman Admin</title>
<link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<script src="../assets/js/sb.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
if (gfAdminGate()) {
  gfAdminShell("art", "文章管理", "台美動態資訊的新增、編輯、刪除與前台顯示控制。含每日日報與每週分析等自動發布文章。", `
    <div class="panel">
      <h2 id="formTitle">新增文章</h2>
      <div class="form-grid">
        <div class="field"><label>標題 *</label><input class="inp" id="fTitle"></div>
        <div class="field"><label>分類 *</label>
          <select class="sel" id="fCat">${GF_CATEGORIES.map(c=>`<option>${c}</option>`).join("")}</select>
        </div>
        <div class="field"><label>發布日期 *</label><input class="inp" type="date" id="fDate"></div>
        <div class="field"><label>&nbsp;</label><span class="notice">自動文章(日報/週報)也可在下方列表編輯或隱藏</span></div>
        <div class="field full"><label>摘要（列表顯示）</label><textarea class="inp" id="fSummary" rows="2"></textarea></div>
        <div class="field full"><label>內文 *</label><textarea class="inp" id="fBody" rows="10" placeholder="支援純文字換行；未來可升級為 Markdown 編輯器"></textarea></div>
      </div>
      <div style="margin-top:16px">
        <button class="btn-sm primary" onclick="saveArt()">儲存文章</button>
        <button class="btn-sm" onclick="resetForm()">清空表單</button>
      </div>
    </div>

    <div class="panel">
      <h2>全部文章列表</h2>
      <p class="notice" style="margin-bottom:12px">「前台顯示」勾選 = 顯示於網站；取消勾選 = 隱藏（文章保留，可隨時恢復）。來源標籤：<span class="badge b-sub">手動</span>後台撰寫、<span class="badge b-sub">日報</span>每日自動、<span class="badge b-sub">週報</span>每週分析。</p>
      <div style="margin-bottom:10px">
        <select class="sel" id="filterType" onchange="renderRows()" style="max-width:180px">
          <option value="">全部來源</option><option value="manual">手動文章</option>
          <option value="daily">每日日報</option><option value="weekly">每週分析</option>
        </select>
      </div>
      <table class="tbl"><thead><tr><th style="width:86px">前台顯示</th><th>日期</th><th>分類</th><th>標題</th><th>來源</th><th style="width:150px">操作</th></tr></thead>
      <tbody id="artRows"></tbody></table>
    </div>

    <div class="panel">
      <h2>每日熱門動態（自動管理）</h2>
      <p class="notice" style="margin-bottom:14px">此區塊由每日彙整系統於每早自動更新（含摘要、產業意涵與原文連結），無需手動維護。以下為目前前台顯示內容的預覽。</p>
      <div id="hotPreview" style="font-size:13.5px;line-height:1.9"></div>
    </div>
  `);

  let editingId = null;
  const $ = id => document.getElementById(id);
  const artType = id => String(id||"").startsWith("daily-") ? "daily" : String(id||"").startsWith("weekly-") ? "weekly" : "manual";
  const typeName = { manual: "手動", daily: "日報", weekly: "週報" };

  let ART_LIST = [];
  async function loadAll() {
    try { ART_LIST = await gfSbSelect("articles", "&order=date.desc,created_at.desc"); }
    catch (e) { ART_LIST = GF_getArticles(); }
    if (!Array.isArray(ART_LIST)) ART_LIST = [];
  }
  window.renderRows = function() {
    const ft = $("filterType").value;
    const list = ft ? ART_LIST.filter(a => artType(a.id) === ft) : ART_LIST;
    $("artRows").innerHTML = list.map(a => {
      const vis = a.visible !== false;
      return `<tr style="${vis ? "" : "opacity:.45"}">
        <td style="text-align:center"><input type="checkbox" ${vis ? "checked" : ""} onchange="toggleVisible('${a.id}', this)" style="width:17px;height:17px;cursor:pointer"></td>
        <td class="mono">${a.date||""}</td>
        <td><span class="art-cat cat-${a.cat}" style="font-size:11px">${a.cat}</span></td>
        <td>${gfEsc(a.title)}</td>
        <td><span class="badge b-sub">${typeName[artType(a.id)]}</span></td>
        <td>
          <button class="btn-sm" onclick="editArt('${a.id}')">編輯</button>
          <button class="btn-sm danger" onclick="delArt('${a.id}')">刪除</button>
        </td></tr>`;
    }).join("") || `<tr><td colspan="6" style="color:var(--slate)">尚無文章</td></tr>`;
  };
  async function refresh() { await loadAll(); renderRows(); }

  window.toggleVisible = async function(id, box) {
    const val = box.checked;
    try {
      await gfSbUpdate("articles", id, { visible: val });
      const a = ART_LIST.find(x => x.id === id); if (a) a.visible = val;
      renderRows();
    } catch (err) {
      box.checked = !val;
      alert("更新失敗：" + err.message + "\n（請確認 articles 表已新增 visible 欄位，且已登入）");
    }
  };

  window.editArt = function(id) {
    const a = ART_LIST.find(x => x.id === id);
    if (!a) return;
    editingId = id;
    $("formTitle").textContent = "編輯文章";
    $("fTitle").value = a.title; $("fCat").value = a.cat;
    $("fDate").value = a.date || ""; $("fSummary").value = a.summary || ""; $("fBody").value = a.body || "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.saveArt = async function() {
    const rec = { title: $("fTitle").value.trim(), cat: $("fCat").value, date: $("fDate").value,
                  summary: $("fSummary").value.trim(), body: $("fBody").value.trim() };
    if (!rec.title || !rec.date || !rec.body) return alert("標題、日期與內文為必填");
    try {
      if (editingId) await gfSbUpdate("articles", editingId, rec);
      else await gfSbInsert("articles", Object.assign({ id: "a" + Date.now(), visible: true }, rec), true);
      resetForm(); await refresh(); alert("已儲存，前台立即生效（全球可見）");
    } catch (err) { alert("儲存失敗：" + err.message + "\n（請確認已登入且網路正常）"); }
  };

  window.delArt = async function(id) {
    if (!confirm("確定刪除這篇文章？（若只是暫時下架，建議改用取消勾選「前台顯示」）")) return;
    try { await gfSbDelete("articles", id); await refresh(); }
    catch (err) { alert("刪除失敗：" + err.message); }
  };

  window.resetForm = function() {
    editingId = null; $("formTitle").textContent = "新增文章";
    ["fTitle","fSummary","fBody"].forEach(i => $(i).value = "");
    $("fDate").value = new Date().toISOString().slice(0,10);
  };

  /* 熱門動態:唯讀預覽(由每日系統自動管理) */
  async function renderHotPreview() {
    const hot = await GF_fetchHot();
    $("hotPreview").innerHTML = GF_CATEGORIES.map(c => {
      const items = hot[c] || [];
      const lines = items.map(x => {
        const o = (x && typeof x === "object") ? x : { t: String(x) };
        return `・${o.d ? `<span class="mono" style="font-size:11px;color:var(--slate)">${o.d}</span> ` : ""}${gfEsc(o.t)}`;
      }).join("<br>");
      return `<p style="margin-bottom:10px"><span class="art-cat cat-${c}" style="font-size:11px">${c}</span><br>${lines || "<span style='color:var(--slate)'>（今日無資料）</span>"}</p>`;
    }).join("");
  }

  resetForm(); refresh(); renderHotPreview();
}
</script>
</body>
</html>
