<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Guide.Ferryman logo">
  <defs>
    <linearGradient id="gfNeedle" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0FA3A8"/>
      <stop offset="1" stop-color="#E8A23D"/>
    </linearGradient>
  </defs>
  <!-- compass ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#0A1C30" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="22.5" fill="none" stroke="#0A1C30" stroke-width="0.8" stroke-dasharray="1.5 4" opacity="0.55"/>
  <!-- cardinal ticks -->
  <g stroke="#0A1C30" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="4.5" x2="32" y2="9.5"/>
    <line x1="32" y1="54.5" x2="32" y2="59.5"/>
    <line x1="4.5" y1="32" x2="9.5" y2="32"/>
    <line x1="54.5" y1="32" x2="59.5" y2="32"/>
  </g>
  <!-- needle pointing NE : the guide -->
  <path d="M32 32 L45.5 18.5 L36.5 30.5 Z" fill="url(#gfNeedle)"/>
  <path d="M32 32 L36.5 30.5 L33.5 36 Z" fill="#0A1C30"/>
  <!-- ferry hull + wave : the ferryman -->
  <path d="M20 40.5 h20 l-3.5 5 h-13 Z" fill="#0A1C30"/>
  <line x1="30" y1="40.5" x2="30" y2="35.5" stroke="#0A1C30" stroke-width="1.6"/>
  <path d="M14 49 q4.5 -3.5 9 0 t9 0 t9 0 t9 0" fill="none" stroke="#0FA3A8" stroke-width="2" stroke-linecap="round"/>
</svg>
